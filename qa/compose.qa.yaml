# Isolated QA stack for the Behemoth test suite.
#
# Fully separate from the default `enigma` compose project: its own project
# name, its own volumes, and remapped host ports (18080/16379/15432) so it
# never collides with a stack another session may be running on 8080/6379/5432.
#
#   docker compose -f qa/compose.qa.yaml up --build -d
#
# App tunables are overridable from the shell (QA_* env) so the durability and
# overload tests can recreate `app` with a throttled writer.
name: behemoth-qa

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: behemoth
      POSTGRES_PASSWORD: behemoth
      POSTGRES_DB: behemoth
    volumes:
      - qa_pgdata:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U behemoth -d behemoth"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "15432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    volumes:
      - qa_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "16379:6379"

  app:
    build: ..
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://behemoth:behemoth@postgres:5432/behemoth?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      MAX_DAMAGE_PER_HIT: "1000000000"
      # Overridable so durability/overload tests can throttle the writer.
      BATCH_MAX_SIZE: "${QA_BATCH_MAX_SIZE:-500}"
      BATCH_MAX_WAIT: "${QA_BATCH_MAX_WAIT:-10ms}"
      WRITER_QUEUE_SIZE: "${QA_WRITER_QUEUE_SIZE:-20000}"
      WRITER_CONCURRENCY: "${QA_WRITER_CONCURRENCY:-8}"
      PG_MAX_CONNS: "20"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qa_pgdata:
  qa_redisdata:
